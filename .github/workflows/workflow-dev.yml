name: Deployment Dev

on: [push]

permissions:
  contents: read
  packages: write

jobs:
  Build:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t ghcr.io/taro-common/farstforward-cms:dev-${{ github.sha }} .

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          docker push ghcr.io/taro-common/farstforward-cms:dev-${{ github.sha }}

      - name: Tag latest
        run: |
          docker tag ghcr.io/taro-common/farstforward-cms:dev-${{ github.sha }} ghcr.io/taro-common/farstforward-cms:dev
          docker push ghcr.io/taro-common/farstforward-cms:dev

